name: Auto Update VPN
on:
  schedule:
    - cron: '0 */2 * * *'  # Запуск каждые 2 часа (00:00, 02:00 и т.д.)
  workflow_dispatch:       # Оставляет кнопку для ручного запуска

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write # Важно: разрешаем боту изменять файлы в репо
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ТЕПЕРЬ СТАВИМ ТУТ (когда Python уже готов)
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cryptography

      - name: Run checker
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
          GH_PROMPT_DISABLED: 1
          GITHUB_REPOSITORY: ${{ github.repository }} # Даем доступ к управлению задачами
        run: python check.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Checker-Bot"
          git config --global user.email "bot@github.com"
          
          # 1. Сначала "добавляем" все изменения в индекс
          git add .
          
          # 2. Теперь делаем pull с ребейзом (теперь гит не будет ругаться на незатейдженные файлы)
          git pull --rebase origin main
          
          # 3. Коммитим (если есть что коммитить)
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: DB and Subscription"
          
          # 4. Пушим
          git push origin main
