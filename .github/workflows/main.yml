name: Auto Update VPN
on:
  schedule:
    - cron: '0 */2 * * *'  # Запуск каждые 2 часа (00:00, 02:00 и т.д.)
  workflow_dispatch:       # Оставляет кнопку для ручного запуска

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Важно: разрешаем боту изменять файлы в репо
    steps:
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cryptography
    
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run checker
        run: python check.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Checker-Bot"
          git config --global user.email "bot@github.com"
          # Добавляем все измененные файлы (1.txt, wifi.txt, status.json)
          git add .
          # Если изменений нет, не падаем с ошибкой
          git commit -m "Auto-update: DB and Subscription" || exit 0
          git push
