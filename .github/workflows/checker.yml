name: 🛡️ Proxy Inquisitor & Monitor

concurrency:
  group: proxy-inquisitor-lock
  cancel-in-progress: true

on:
  push:
    paths:
      - 'kr/mob/wifi.txt'
      - 'test1/vetted.txt'
      - 'test1/pinned.txt'
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'
  issues:
    types: [edited]

jobs:
  check:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issues' &&
        github.event.action == 'edited' &&
        github.event.sender.login != 'github-actions[bot]' &&
        (
          contains(github.event.issue.body, '- [x] 💀 **ПОДТВЕРДИТЬ_БАН**') ||
          contains(github.event.issue.body, '- [X] 💀 **ПОДТВЕРДИТЬ_БАН**') ||
          contains(github.event.issue.body, '- [x] ✅ **ПРИМЕНИТЬ_PIN_BAN**') ||
          contains(github.event.issue.body, '- [X] ✅ **ПРИМЕНИТЬ_PIN_BAN**') ||
          contains(github.event.issue.body, '- [x] 🏆 **ПОДТВЕРДИТЬ_ИЗБРАННОЕ**') ||
          contains(github.event.issue.body, '- [X] 🏆 **ПОДТВЕРДИТЬ_ИЗБРАННОЕ**') ||
          contains(github.event.issue.body, '- [x] 🔓 **ПОДТВЕРДИТЬ_РАСПИН**') ||
          contains(github.event.issue.body, '- [X] 🔓 **ПОДТВЕРДИТЬ_РАСПИН**')
        )
      )
    timeout-minutes: 360
    permissions:
      contents: write
      issues: write

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠️ Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: 🔧 Build Go L7 Library
        run: |
          rm -f go.mod go.sum
          go mod init proxy_checker
          go get github.com/xtls/xray-core@v1.8.24
          go get github.com/xtls/xray-core/infra/conf/serial@v1.8.24
          go mod tidy
          go build -buildmode=c-shared -ldflags="-s -w" -o libchecker.so checker.go

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ⚙️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests cryptography psutil

      - name: ⛓️ Run Torturer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LD_LIBRARY_PATH: .
        run: python torture_bot.py

      - name: 💾 Save Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "📊 Sync: Ranking and Vetted updated [skip ci]" || echo "No changes to commit"
          git pull --rebase -X theirs origin main
          git push origin main
