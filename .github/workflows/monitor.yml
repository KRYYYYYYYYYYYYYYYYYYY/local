name: Server Monitor (Executioner)
on:
  schedule:
    - cron: '*/15 * * * *' # Запуск каждые 15 минут
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # РАЗРЕШАЕМ ПРАВИТЬ ФАЙЛЫ (блокировка/удаление)
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Monitor
        run: python monitor.py

      - name: Save Clean Lists
        run: |
          git config --global user.name "Monitor-Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Monitor: Cleaned dead servers and updated Blacklist" || exit 0
          git push origin main
