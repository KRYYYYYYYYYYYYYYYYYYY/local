name: 🛡️ Proxy Inquisitor & Monitor

# БЛОК ЗАЩИТЫ ОТ ОДНОВРЕМЕННЫХ ЗАПУСКОВ
concurrency:
  group: proxy-inquisitor-lock
  cancel-in-progress: false # Новый запуск будет ждать, пока старый не доделает "пытки"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # Даем инквизитору 6 часов (максимум для GitHub)
    permissions:
      contents: write
      issues: read # Даем право читать Issue для системы PIN

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠️ Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: 🔧 Build Go L7 Library
        run: |
          rm -f go.mod go.sum
          go mod init proxy_checker
          go get github.com/xtls/xray-core@v1.8.24
          go get github.com/xtls/xray-core/infra/conf/serial@v1.8.24
          go mod tidy
          go build -buildmode=c-shared -ldflags="-s -w" -o libchecker.so checker.go

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ⚙️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install psutil

      - name: ⛓️ Run Torturer
        # ДОБАВЛЯЕМ ПЕРЕМЕННЫЕ ОКРУЖЕНИЯ
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LD_LIBRARY_PATH: .
        run: python torture_bot.py

      - name: 💾 Save Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "📊 Sync: Ranking and Vetted updated [skip ci]" || echo "No changes to commit"
          git pull --rebase -X theirs origin main
          git push origin main
